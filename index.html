<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>canvas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F7F5F0;font-family:'Inter',sans-serif;color:#1a1a1a}

body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
}

/* Subtle paper texture via pseudo */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;text-align:center;width:100%;max-width:400px;padding:0 24px;}

.logotype{
  font-size:13px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;
  color:#888;margin-bottom:56px;
}

h1{
  font-size:clamp(40px,9vw,64px);
  font-weight:300;
  letter-spacing:-2.5px;
  line-height:1;
  color:#1a1a1a;
  margin-bottom:8px;
}
h1 em{font-style:normal;font-weight:600;}

.sub{font-size:15px;color:#888;font-weight:400;margin-bottom:52px;line-height:1.5}

.input-block{display:flex;flex-direction:column;gap:10px;align-items:center;}

.code-field{
  width:100%;
  background:#fff;
  border:1.5px solid #E0DDD8;
  border-radius:12px;
  padding:16px 20px;
  font-family:'Inter',sans-serif;
  font-size:28px;
  font-weight:600;
  letter-spacing:10px;
  text-align:center;
  text-transform:uppercase;
  color:#1a1a1a;
  outline:none;
  transition:border-color .18s,box-shadow .18s;
  caret-color:#1a1a1a;
}
.code-field::placeholder{color:#D0CEC9;letter-spacing:6px;}
.code-field:focus{border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(26,26,26,.07);}

.btn-go{
  width:100%;
  background:#1a1a1a;
  border:none;
  border-radius:12px;
  padding:16px;
  font-family:'Inter',sans-serif;
  font-size:15px;
  font-weight:500;
  color:#fff;
  cursor:pointer;
  transition:opacity .15s,transform .12s;
  letter-spacing:0.02em;
}
.btn-go:hover{opacity:.88;}
.btn-go:active{transform:scale(.98);}

.divider{
  display:flex;align-items:center;gap:12px;width:100%;
  color:#C0BDB8;font-size:12px;letter-spacing:0.05em;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E8E5E0;}

.btn-new{
  width:100%;
  background:transparent;
  border:1.5px solid #E0DDD8;
  border-radius:12px;
  padding:15px;
  font-family:'Inter',sans-serif;
  font-size:15px;
  font-weight:400;
  color:#666;
  cursor:pointer;
  transition:border-color .18s,color .18s,background .18s;
}
.btn-new:hover{border-color:#1a1a1a;color:#1a1a1a;background:#fff;}

.err{font-size:13px;color:#E05A5A;min-height:18px;margin-top:4px;}

.hint{
  margin-top:48px;font-size:12px;color:#AAA;line-height:1.7;
}
.hint kbd{
  display:inline-block;
  background:#EDEAE5;
  border-radius:5px;
  padding:1px 6px;
  font-family:'Inter',monospace;
  font-size:11px;
  font-weight:600;
  color:#555;
  letter-spacing:2px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logotype">canvas</div>

  <h1>рисуй<br/><em>вместе.</em></h1>
  <p class="sub">Введи код — окажись на одном полотне<br/>с кем угодно, где угодно.</p>

  <div class="input-block">
    <input class="code-field" id="inp" maxlength="4" placeholder="ab12" autocomplete="off" spellcheck="false"/>
    <div class="err" id="err"></div>
    <button class="btn-go" onclick="enter()">Открыть полотно</button>
    <div class="divider">или</div>
    <button class="btn-new" onclick="random()">Создать новое →</button>
  </div>

  <p class="hint">
    Поделись кодом <kbd>ab12</kbd> — друг окажется рядом.
  </p>
</div>

<script>
const inp=document.getElementById('inp');
const err=document.getElementById('err');

inp.addEventListener('input',()=>{
  inp.value=inp.value.replace(/[^a-zA-Z0-9]/g,'').toLowerCase().slice(0,4);
  err.textContent='';
});
inp.addEventListener('keydown',e=>{ if(e.key==='Enter') enter(); });

function enter(){
  const v=inp.value.trim();
  if(v.length!==4){err.textContent='Нужно ровно 4 символа';return;}
  go(v);
}
function random(){
  const c='abcdefghijklmnopqrstuvwxyz0123456789';
  let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];
  go(r);
}
function go(code){
  location.href='canvas.html?r='+code;
}
</script>
</body>
</html>
